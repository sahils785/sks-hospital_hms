input {
  tcp {
    port => 5044
    codec => json_lines
  }
}

filter {
  if [service] {
    mutate {
      add_field => { "[@metadata][index_name]" => "hospital-%{service}" }
    }
  } else {
    mutate {
      add_field => { "[@metadata][index_name]" => "hospital-unknown" }
    }
  }

  date {
    match => [ "timestamp", "ISO8601", "yyyy-MM-dd HH:mm:ss.SSS" ]
    target => "@timestamp"
  }

  if [level] == "ERROR" {
    mutate {
      add_tag => [ "error" ]
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "%{[@metadata][index_name]}-%{+YYYY.MM.dd}"
  }

  stdout {
    codec => rubydebug
  }
}
