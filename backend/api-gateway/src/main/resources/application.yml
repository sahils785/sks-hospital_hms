server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 50
            redis-rate-limiter.burstCapacity: 100
            redis-rate-limiter.requestedTokens: 1
            key-resolver: "#{@ipKeyResolver}"
        - name: CircuitBreaker
          args:
            name: defaultCircuitBreaker
            fallbackUri: forward:/fallback

      routes:
        # Auth Service
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=0

        - id: user-service
          uri: lb://auth-service
          predicates:
            - Path=/api/users/**
          filters:
            - StripPrefix=0

        # Patient Service
        - id: patient-service
          uri: lb://patient-service
          predicates:
            - Path=/api/patients/**
          filters:
            - StripPrefix=0

        # Doctor Service
        - id: doctor-service
          uri: lb://doctor-service
          predicates:
            - Path=/api/doctors/**
          filters:
            - StripPrefix=0

        # Appointment Service
        - id: appointment-service
          uri: lb://appointment-service
          predicates:
            - Path=/api/appointments/**
          filters:
            - StripPrefix=0

        # Prescription Service
        - id: prescription-service
          uri: lb://prescription-service
          predicates:
            - Path=/api/prescriptions/**
          filters:
            - StripPrefix=0

        # Billing Service
        - id: billing-service
          uri: lb://billing-service
          predicates:
            - Path=/api/billing/**
          filters:
            - StripPrefix=0

        # Notification Service
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/notifications/**
          filters:
            - StripPrefix=0

        # Audit Service
        - id: audit-service
          uri: lb://audit-service
          predicates:
            - Path=/api/audit/**
          filters:
            - StripPrefix=0

        # Swagger UI aggregation per service
        - id: auth-service-docs
          uri: lb://auth-service
          predicates:
            - Path=/auth-service/v3/api-docs/**
          filters:
            - RewritePath=/auth-service/(?<remaining>.*), /${remaining}

        - id: patient-service-docs
          uri: lb://patient-service
          predicates:
            - Path=/patient-service/v3/api-docs/**
          filters:
            - RewritePath=/patient-service/(?<remaining>.*), /${remaining}

        - id: doctor-service-docs
          uri: lb://doctor-service
          predicates:
            - Path=/doctor-service/v3/api-docs/**
          filters:
            - RewritePath=/doctor-service/(?<remaining>.*), /${remaining}

        - id: appointment-service-docs
          uri: lb://appointment-service
          predicates:
            - Path=/appointment-service/v3/api-docs/**
          filters:
        - id: prescription-service-docs
          uri: lb://prescription-service
          predicates:
            - Path=/prescription-service/v3/api-docs/**
          filters:
            - RewritePath=/prescription-service/(?<remaining>.*), /${remaining}

        - id: billing-service-docs
          uri: lb://billing-service
          predicates:
            - Path=/billing-service/v3/api-docs/**
          filters:
            - RewritePath=/billing-service/(?<remaining>.*), /${remaining}

        - id: notification-service-docs
          uri: lb://notification-service
          predicates:
            - Path=/notification-service/v3/api-docs/**
          filters:
            - RewritePath=/notification-service/(?<remaining>.*), /${remaining}

        - id: audit-service-docs
          uri: lb://audit-service
          predicates:
            - Path=/audit-service/v3/api-docs/**
          filters:
            - RewritePath=/audit-service/(?<remaining>.*), /${remaining}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

jwt:
  secret: ${JWT_SECRET:dGhpcyBpcyBhIHZlcnkgbG9uZyBzZWNyZXQga2V5IGZvciBob3NwaXRhbCBtYW5hZ2VtZW50IHN5c3RlbSBqd3QgdG9rZW4gZ2VuZXJhdGlvbg==}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://eureka:eureka_secret@localhost:8761/eureka/}
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.value}

resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10000
        permitted-number-of-calls-in-half-open-state: 5
        automatic-transition-from-open-to-half-open-enabled: true
    instances:
      defaultCircuitBreaker:
        base-config: default

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,gateway
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

springdoc:
  swagger-ui:
    urls:
      - name: Auth Service
        url: /auth-service/v3/api-docs
      - name: Patient Service
        url: /patient-service/v3/api-docs
      - name: Doctor Service
        url: /doctor-service/v3/api-docs
      - name: Appointment Service
        url: /appointment-service/v3/api-docs
      - name: Prescription Service
        url: /prescription-service/v3/api-docs
      - name: Billing Service
        url: /billing-service/v3/api-docs
      - name: Notification Service
        url: /notification-service/v3/api-docs
      - name: Audit Service
        url: /audit-service/v3/api-docs

logging:
  level:
    com.hospital.gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG
