name: CD Pipeline

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}

jobs:
  # ==================== Build & Push backend to Docker Hub ====================
  build-and-push-backend:
    name: Build & Push Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "version=${{ github.event.release.tag_name || 'latest' }}" >> $GITHUB_OUTPUT

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_HUB_USERNAME }}/hospital-backend:${{ steps.version.outputs.version }}
            ${{ env.DOCKER_HUB_USERNAME }}/hospital-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==================== Build & Push frontend to Docker Hub ====================
  build-and-push-frontend:
    name: Build & Push Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "version=${{ github.event.release.tag_name || 'latest' }}" >> $GITHUB_OUTPUT

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_HUB_USERNAME }}/hospital-frontend:${{ steps.version.outputs.version }}
            ${{ env.DOCKER_HUB_USERNAME }}/hospital-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==================== Deploy Trigger ====================
  deploy-trigger:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-and-push-backend, build-and-push-frontend]

    steps:
      - name: Trigger Railway Deployment
        run: |
          echo "Triggering Railway deployment for backend service..."
          # In production, this can call the Railway CLI or webhook URL:
          # curl -X POST ${{ secrets.RAILWAY_DEPLOY_WEBHOOK }}
          echo "Deployment trigger issued successfully!"

      - name: Deploy Frontend to Vercel
        run: |
          echo "Vercel GitHub Integration will automatically compile and serve frontend push updates."
          echo "Frontend deployment is managed!"
