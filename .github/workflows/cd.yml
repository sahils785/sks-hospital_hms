name: CD Pipeline

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
  AWS_REGION: us-east-1

jobs:
  # ==================== Build & Push Docker Images ====================
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - discovery-service
          - api-gateway
          - auth-service
          - patient-service
          - doctor-service
          - appointment-service
          - prescription-service
          - billing-service
          - notification-service
          - audit-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build backend
        working-directory: ./backend
        run: mvn clean package -pl ${{ matrix.service }} -am -DskipTests -B

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "version=${{ github.event.release.tag_name || 'latest' }}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_HUB_USERNAME }}/hospital-${{ matrix.service }}:${{ steps.version.outputs.version }}
            ${{ env.DOCKER_HUB_USERNAME }}/hospital-${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==================== Build & Push Frontend ====================
  build-frontend:
    name: Build & Push Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "version=${{ github.event.release.tag_name || 'latest' }}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.DOCKER_HUB_USERNAME }}/hospital-frontend:${{ steps.version.outputs.version }}
            ${{ env.DOCKER_HUB_USERNAME }}/hospital-frontend:latest

  # ==================== Deploy to AWS ECS ====================
  deploy:
    name: Deploy to AWS ECS
    runs-on: ubuntu-latest
    needs: [build-and-push, build-frontend]
    environment: ${{ github.event.inputs.environment || 'staging' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Extract version
        id: version
        run: echo "version=${{ github.event.release.tag_name || 'latest' }}" >> $GITHUB_OUTPUT

      - name: Update ECS services
        run: |
          SERVICES=("discovery" "gateway" "auth" "patient" "doctor" "appointment" "prescription" "billing" "notification" "audit" "frontend")
          CLUSTER="hospital-cluster-${{ github.event.inputs.environment || 'staging' }}"

          for service in "${SERVICES[@]}"; do
            echo "Updating service: hospital-${service}-service"
            aws ecs update-service \
              --cluster $CLUSTER \
              --service "hospital-${service}-service" \
              --force-new-deployment \
              --region ${{ env.AWS_REGION }} || echo "Service hospital-${service}-service not found, skipping..."
          done

      - name: Wait for deployments
        run: |
          CLUSTER="hospital-cluster-${{ github.event.inputs.environment || 'staging' }}"
          aws ecs wait services-stable \
            --cluster $CLUSTER \
            --services hospital-gateway-service \
            --region ${{ env.AWS_REGION }}
          echo "Gateway service is stable!"
